# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:
    permissions:
      # write permission is required to create a github release
      contents: write
      # write permission is required for autolabeler
      # otherwise, read permission is required at least
      pull-requests: write
      # To consume code-obos packages
      packages: read
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Detect whether this run touches content images or the image lint rules,
      # so we can skip the (deterministic) image lint when nothing relevant
      # changed.
      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          filters: |
            content-images:
              - 'apps/docs/src/content/**/images/**'
              - 'apps/docs/scripts/lint-images.ts'

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://npm.pkg.github.com'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Build packages and generate docs artifacts before lint so that
      # type-aware linting can resolve workspace package types and the
      # generated `@/component-props` / `@/colors` modules used by docs.
      - name: Build packages
        run: pnpm run build

      - name: Generate docs artifacts
        run: pnpm --filter @obosbbl/grunnmuren-docs run build:props && pnpm --filter @obosbbl/grunnmuren-docs run build:colors

      - name: lint
        run: pnpm lint && pnpm fmt:check

      # Build the docs app on PR so MDX compile errors and any other docs
      # build regressions are caught before merge (cd.yml builds at deploy
      # time, which is too late).
      - name: Build docs
        run: pnpm --filter @obosbbl/grunnmuren-docs run build

      # Enforce the documentation image budget (no CDN optimisation in-repo).
      # Skipped when no content images or lint rules changed — the check is
      # deterministic, so nothing new can fail unless those files moved.
      - name: Lint docs images
        if: steps.changes.outputs.content-images == 'true'
        run: pnpm --filter @obosbbl/grunnmuren-docs run lint:images

      # It makes sense to do this on PRs to ensure the change didn't break the Storybook
      - name: Build storybook
        run: pnpm build:storybook
